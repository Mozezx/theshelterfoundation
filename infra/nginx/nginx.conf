server {
    listen 80;
    server_name localhost;

    root /usr/share/nginx/html;
    index index.html;

    # Suporte fundamental para rotas do lado do cliente (SPA / React Router)
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Otimização: Cache prolongado para arquivos estáticos construídos
    location ~* \.(?:ico|css|js|gif|jpe?g|png|woff2?|eot|ttf|svg)$ {
        expires 6M;
        access_log off;
        add_header Cache-Control "public";
    }
}
